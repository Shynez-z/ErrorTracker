name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v3

    # ----------------------------
    # 2️⃣ Backend - Install & Test
    # ----------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Run backend tests
      run: |
        cd backend
        npm test || echo "No tests yet"

    # ----------------------------
    # 3️⃣ Frontend - Install & Build
    # ----------------------------
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Build Angular
      run: |
        cd frontend
        npm run build -- --configuration production

    # ----------------------------
    # 4️⃣ Docker Login
    # ----------------------------
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ----------------------------
    # 5️⃣ Build Docker Image
    # ----------------------------
    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/errortracker:latest .

    # ----------------------------
    # 6️⃣ Push Docker Image
    # ----------------------------
    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/errortracker:latest

    # ----------------------------
    # 7️⃣ Trigger Render Deploy
    # ----------------------------
    - name: Trigger Render deploy
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
